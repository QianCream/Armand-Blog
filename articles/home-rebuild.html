          <h1 class="article-title">把首页重新做了一遍</h1>
        </header>
        <article class="article-content reveal reveal-delay">
          <p>这次重做首页，最主要的原因不是它不能用，而是它还不够像我自己。之前的版本看起来太像一个被快速搭起来的页面，结构虽然齐全，但主次不够明确，信息和信息之间也没有形成真正稳定的关系。首页作为整个博客的入口，应该先让人感受到气质，再让人理解内容，所以这次我把标题、头像、文章入口、作品入口和标签系统都重新整理了一遍。做的时候我一直在控制一件事，就是不要为了“设计感”去加多余的东西，而是让每一块都承担明确作用。最终这版看起来更干净，但不是空；更统一，但不是死板。对我来说，这种变化比单纯换一组样式更重要，因为它让这个博客开始慢慢长出一点属于自己的秩序。</p>
        </article>

    </main>
