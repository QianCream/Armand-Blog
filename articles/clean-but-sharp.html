          <h1 class="article-title">界面要干净，也要有点脾气</h1>
        </header>
        <article class="article-content reveal reveal-delay">
          <p>我一直觉得，一个页面真正好看，不是因为它有多少效果，而是因为它知道自己该停在哪里。太满的页面会吵，太空的页面会弱，这两种都不难做，难的是在克制里面留下自己的判断。很多时候所谓的“高级感”只是把内容删掉了，但删掉内容不等于留下结构，也不等于真的有气质。真正让我在意的是，当一个页面只剩下标题、文字、按钮、边框和留白时，它还能不能站得住，还能不能让人看完之后记住一点什么。我想要的不是一个中性的壳，而是一个干净但不失锋利感的界面，所以我会在标签语言、标题节奏、字重关系和交互反馈这些细节里，慢慢把它推向更像自己的方向。页面不需要吵闹，但也不该没有态度。</p>
        </article>
